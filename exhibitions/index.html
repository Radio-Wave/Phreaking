<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exhibitions — Phreaking Collective</title>
  <meta name="description" content="Exhibitions presented by and featuring the Phreaking Collective." />
  <link rel="icon" href="/assets/PhreakingLogoSquare_white.ico" sizes="any">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/styles/sidebar.css">

  <link rel="stylesheet" href="/styles/static-pages.css">

  <!-- Keep the roomy index layout while reusing static page components -->
  <style>
    .page-exhibitions .right {
      max-width: none;
      margin-left: calc(var(--left, var(--pc-sidebar-width)) + var(--g, var(--pc-sidebar-gap)));
      padding: var(--pad);
      align-items: stretch;
    }

    @media (max-width: 640px) {
      .page-exhibitions .right {
        margin-left: 0;
        padding: var(--pad);
      }
    }
  </style>
</head>

<body class="page-exhibitions">
  <div data-sidebar data-sidebar-active="exhibitions/index.html"></div>

  <main class="layout" role="main">
    <section class="right">
      <header class="right-header" aria-hidden="true">
        <a class="brand-inline" href="/">
          <img src="/assets/PhreakingLogoWhite.png" alt="Phreaking Collective">
        </a>
      </header>

      <h1>Exhibitions</h1>

      <hr class="note">

      <h2 class="section-title">Exhibitions hosted by Phreaking Collective:</h2>

      <div id="exhibitions-hosted"></div>

      <hr class="note">

      <h2 class="section-title">Exhibitions featuring Phreaking Collective members:</h2>

      <div id="exhibitions-featured"></div>
    </section>
  </main>

  <footer class="site-footer">
    <nav class="actions" aria-label="Primary actions">
      <a class="button" href="mailto:phreakingcollective@gmail.com">Email us</a>
      <a class="button ghost" href="https://www.instagram.com/phreaking_collective">Instagram</a>
    </nav>
    <p>© <span id="year"></span> Phreaking Collective — London.</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
  <script defer src="/scripts/exhibitions.js"></script>
  <script defer src="/scripts/sidebar.js"></script>
